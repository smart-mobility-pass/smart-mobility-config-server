spring.application.name=spring-cloud-config-server
server.port=8888

spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.uri=https://github.com/smart-mobility-pass/smart-mobility-configuration.git

## Native profile configuration (relative for local development)
#spring.profiles.active=native
